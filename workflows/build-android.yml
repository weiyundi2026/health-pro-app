name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Initialize Capacitor
        run: npx cap init 'Health Pro' com.healthpro.app --web-dir=www

      - name: Add Android platform
        run: npx cap add android

      - name: Sync web assets
        run: npx cap sync android

      - name: Remove risky permissions from AndroidManifest
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          # 删除 DUMP 权限（系统调试权限，普通应用不需要）
          sed -i '/android.permission.DUMP/d' "$MANIFEST"
          # 删除 RECORD_AUDIO 权限（本应用不需要录音功能）
          sed -i '/android.permission.RECORD_AUDIO/d' "$MANIFEST"
          echo "=== 当前权限列表 ==="
          grep -o 'android.permission[^"]*' "$MANIFEST" | sort -u || echo "无额外权限"

      - name: Verify permissions removed
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if grep -q 'android.permission.DUMP' "$MANIFEST"; then
            echo "❌ DUMP 权限仍然存在，构建终止"
            exit 1
          else
            echo "✅ DUMP 权限已移除"
          fi

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: HealthPro-APK-v3.3.0
          path: android/app/build/outputs/apk/debug/app-debug.apk
