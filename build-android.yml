name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm install
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Initialize Capacitor
        run: npx cap init "Health Pro" com.healthpro.app --web-dir=www

      - name: Add Android platform
        run: npx cap add android

      - name: Sync web assets
        run: npx cap sync android

      # ===== 修复：删除危险权限（防止审核被拒） =====
      - name: Remove dangerous permissions
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          # 删除 DUMP 权限（系统级权限，普通APP不应声明）
          sed -i 's/<uses-permission android:name="android.permission.DUMP"\/>//g' "$MANIFEST"
          # 删除未使用的 RECORD_AUDIO（减少用户疑虑）
          sed -i 's/<uses-permission android:name="android.permission.RECORD_AUDIO"\/>//g' "$MANIFEST"
          echo "=== 权限修复后的 AndroidManifest.xml ==="
          grep 'uses-permission' "$MANIFEST" || echo "（无自定义权限）"

      - name: Verify DUMP removed
        run: |
          if grep -q 'android.permission.DUMP' android/app/src/main/AndroidManifest.xml; then
            echo "ERROR: DUMP permission still present!"
            exit 1
          else
            echo "✅ DUMP 权限已成功移除"
          fi

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: HealthPro-APK-v3.3.0
          path: android/app/build/outputs/apk/debug/app-debug.apk
